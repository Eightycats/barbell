<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Barbell Plate Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#444444">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Barbell">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">

  <link rel="stylesheet" href="barbell.css">
  <script src="./barbell.js" defer></script>
</head>
<body>

  <h2 align="center">Plate Calculator</h2>

    <div id="barWeightSelection">
      <span style="font-size: 16px; margin-right: 10px;">Bar:</span>
      
      <label style="display: inline-flex; align-items: center; margin: 0 5px;">
        <input type="radio" name="barWeight" value="10" data-color="green" style="margin-right: 5px;">
        <span style="background-color: green; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold;">10</span>
      </label>
      
      <label style="display: inline-flex; align-items: center; margin: 0 5px;">
        <input type="radio" name="barWeight" value="15" data-color="yellow" style="margin-right: 5px;">
        <span style="background-color: yellow; color: black; padding: 4px 8px; border-radius: 4px; font-weight: bold;">15</span>
      </label>
      
      <label style="display: inline-flex; align-items: center; margin: 0 5px;">
        <input type="radio" name="barWeight" value="20" data-color="blue" style="margin-right: 5px;" checked>
        <span style="background-color: blue; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold;">20</span>
      </label>
      <span>kg</span>
    </div>
    

    <div class="info-row">
        <div class="info-center slider-group">
            <div class="weight-header">
                <div class="weight-kg-row">
                    <input type="number" id="totalWeight" class="weight-big-input" value="100" min="0" max="250" step="1">
                    <span class="weight-big-unit">kg</span>
                </div>
                <span class="weight-lbs" id="totalWeightLbs">(220.5 lbs)</span>
            </div>
        </div>
    </div>

    <div class="barbell-display">
        <div class="barbellWorkout" data-weight="100"></div>
    </div>

    <div class="slider-wrapper">
        <div class="slider-row">
            <button class="slider-adj-btn" id="decrementBtn">-1</button>
            <div class="slider-track">
                <input type="range" id="weightSlider" min="0" max="250" step="1" value="100">
                <div id="sliderTicks" class="slider-ticks"></div>
            </div>
            <button class="slider-adj-btn" id="incrementBtn">+1</button>
        </div>
    </div>

<script>
  const slider = document.getElementById('weightSlider');
  const numberInput = document.getElementById('totalWeight');

  function updateBarbellDisplay() {
    const total = parseFloat(numberInput.value);
    const bar = document.querySelector('input[name="barWeight"]:checked');
    const display = document.querySelector('.barbellWorkout');

    if (!bar || isNaN(total) || total <= 0) return;

    display.dataset.weight = total;
    if (typeof renderAllBarbells === 'function') renderAllBarbells();

    document.getElementById('totalWeightLbs').textContent = '(' + (total * 2.2046).toFixed(1) + ' lbs)';
    updateSliderFill(total);
  }

  function updateSliderFill(value) {
    const sliderMin = parseFloat(slider.min);
    const pct = ((Math.min(value, 250) - sliderMin) / (250 - sliderMin)) * 100;
    slider.style.setProperty('--fill-pct', pct + '%');
  }

  function getBarWeight() {
    const bar = document.querySelector('input[name="barWeight"]:checked');
    return bar ? parseFloat(bar.value) : 0;
  }

  function setWeight(value) {
    const minWeight = getBarWeight();
    const clamped = Math.max(minWeight, value);
    numberInput.value = clamped;
    slider.value = clamped;
    updateBarbellDisplay();
  }

  document.getElementById('decrementBtn').addEventListener('click', () => {
    setWeight(parseFloat(numberInput.value) - 1);
  });

  document.getElementById('incrementBtn').addEventListener('click', () => {
    setWeight(Math.min(250, parseFloat(numberInput.value) + 1));
  });

  // Live update while dragging
  slider.addEventListener('input', () => setWeight(slider.value));

  slider.addEventListener('change', () => setWeight(slider.value));

  // Number input: sync to slider
  numberInput.addEventListener('input', () => {
    const minWeight = getBarWeight();
    const clamped = Math.max(minWeight, parseFloat(numberInput.value) || 0);
    slider.value = clamped;
    numberInput.value = clamped;
    updateBarbellDisplay();
  });

  document.querySelectorAll('input[name="barWeight"]').forEach(radio => {
    radio.addEventListener('change', () => {
      const minWeight = parseFloat(radio.value);
      slider.min = minWeight;
      numberInput.min = minWeight;
      generateTicks();
      if (parseFloat(numberInput.value) < minWeight) {
        setWeight(minWeight);
      } else {
        updateBarbellDisplay();
      }
    });
  });

  // Generate slider tick marks relative to current slider min
  function generateTicks() {
    const ticksContainer = document.getElementById('sliderTicks');
    ticksContainer.innerHTML = '';
    const sliderMin = parseFloat(slider.min);
    const sliderMax = 250;
    const thumbPx = 36;
    const tickSet = new Set();
    tickSet.add(sliderMin);
    for (let v = 0; v <= sliderMax; v += 20) { if (v >= sliderMin) tickSet.add(v); }
    for (let v = 0; v <= sliderMax; v += 50) { if (v >= sliderMin) tickSet.add(v); }
    const tickValues = [...tickSet].sort((a, b) => a - b);
    tickValues.forEach(v => {
      const pct = (v - sliderMin) / (sliderMax - sliderMin);
      const tick = document.createElement('div');
      tick.className = 'slider-tick';
      tick.style.left = `calc(${pct} * (100% - ${thumbPx}px) + ${thumbPx / 2}px)`;
      const mark = document.createElement('div');
      mark.className = 'tick-mark';
      tick.appendChild(mark);
      if (v % 50 === 0 || v === sliderMin) {
        const label = document.createElement('span');
        label.className = 'tick-label';
        label.textContent = v;
        tick.appendChild(label);
      }
      ticksContainer.appendChild(tick);
    });
  }
  // Initialize slider min to match default selected bar
  (function() {
    const defaultBar = document.querySelector('input[name="barWeight"]:checked');
    if (defaultBar) {
      const minWeight = parseFloat(defaultBar.value);
      slider.min = minWeight;
      numberInput.min = minWeight;
    }
  })();

  generateTicks();

  updateBarbellDisplay();

  // Show iOS install banner only on iOS Safari when not already installed
  (function() {
    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isInStandaloneMode = window.navigator.standalone === true;
    if (isIos && !isInStandaloneMode) {
      document.getElementById('ios-install-banner').style.display = 'flex';
    }
  })();
</script>

<div id="ios-install-banner" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#222; color:#fff; font-size:13px; padding:10px 16px; align-items:center; justify-content:center; gap:6px; z-index:1000; border-top:1px solid #444;">
  <span>Tap</span>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
  <span>then <strong>Add to Home Screen</strong> to install</span>
</div>

</body>
</html>
